title: Sunspot
description: Prove and verify Noir circuits on Solana.
remote_theme: just-the-docs/just-the-docs

url: https://reilabs.github.io
baseurl: /sunspot

# Just the Docs settings
color_scheme: dark
search_enabled: true
heading_anchors: true

aux_links:
  GitHub:
    - https://github.com/reilabs/sunspot

aux_links_new_tab: true

footer_content: >-
  Built by <a href="https://reilabs.io">Reilabs</a>.
  Source on <a href="https://github.com/reilabs/sunspot">GitHub</a>.

# Callouts
callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Apply the themed layout to every page/post unless overridden in front-matter
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"

# Exclude things Jekyll shouldn't try to render
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
